name: cerebrofy
base: core22
version: git
summary: AI-ready codebase indexer
description: |
  Cerebrofy indexes your codebase into a local graph + vector database
  and provides AI-grounded planning and specification tools.
  Run 'cerebrofy init' in any git repo to get started.

grade: stable
confinement: classic

apps:
  cerebrofy:
    command: bin/cerebrofy

parts:
  cerebrofy:
    plugin: python
    source: .
    python-packages:
      - "cerebrofy[mcp]"
    build-packages:
      - python3-dev
      - gcc

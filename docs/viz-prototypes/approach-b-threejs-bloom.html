<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cerebrofy Viz — Approach B</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    canvas { display: block; }
    #label { position: fixed; top: 16px; left: 16px; color: #81c784; font-size: 13px; line-height: 1.7; z-index: 10; pointer-events: none; }
    #label small { color: #555; font-size: 11px; display: block; }
    .legend { position: fixed; bottom: 16px; left: 16px; display: flex; flex-direction: column; gap: 5px; z-index: 10; pointer-events: none; }
    .legend-item { display: flex; align-items: center; gap: 8px; color: #aaa; font-size: 11px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>
<div id="label">
  APPROACH B — Pure Three.js + TubeGeometry + UnrealBloomPass
  <small>Full DTI aesthetic · Real bloom glow · Manual physics wiring</small>
</div>
<div class="legend">
  <div class="legend-item"><div class="dot" style="background:#4fc3f7"></div>Frontal</div>
  <div class="legend-item"><div class="dot" style="background:#81c784"></div>Parietal</div>
  <div class="legend-item"><div class="dot" style="background:#ffb74d"></div>Temporal</div>
  <div class="legend-item"><div class="dot" style="background:#f06292"></div>Occipital</div>
  <div class="legend-item"><div class="dot" style="background:#ce93d8"></div>Limbic</div>
</div>

<script type="module">
import * as THREE from './vendor/three.module.js';
import { OrbitControls } from './vendor/jsm/controls/OrbitControls.js';
import { EffectComposer } from './vendor/jsm/postprocessing/EffectComposer.js';
import { RenderPass } from './vendor/jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from './vendor/jsm/postprocessing/UnrealBloomPass.js';

const W = window.innerWidth, H = window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.8;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x00000a);

const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 2000);
camera.position.set(0, 0, 280);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(W, H), 2.0, 0.5, 0.08));

const LOBES = [
  { color: new THREE.Color(0x4fc3f7), pos: new THREE.Vector3(-110,  55,   0) },
  { color: new THREE.Color(0x81c784), pos: new THREE.Vector3(  65,  95,   0) },
  { color: new THREE.Color(0xffb74d), pos: new THREE.Vector3(   0, -65,  95) },
  { color: new THREE.Color(0xf06292), pos: new THREE.Vector3(  95,   0, -55) },
  { color: new THREE.Color(0xce93d8), pos: new THREE.Vector3(   0,   0,   0) },
];

const positions = [], lobeIdxs = [];

LOBES.forEach((lobe, li) => {
  for (let i = 0; i < 10; i++) {
    const p = lobe.pos.clone().add(new THREE.Vector3(
      (Math.random()-.5)*55, (Math.random()-.5)*55, (Math.random()-.5)*55
    ));
    positions.push(p); lobeIdxs.push(li);
    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(2.8, 14, 14),
      new THREE.MeshBasicMaterial({ color: lobe.color })
    );
    mesh.position.copy(p);
    scene.add(mesh);
  }
});

function addTract(p1, p2, color, opacity = 0.45) {
  const ctrl = p1.clone().lerp(p2, 0.5).add(
    new THREE.Vector3((Math.random()-.5)*35, (Math.random()-.5)*35, (Math.random()-.5)*35)
  );
  scene.add(new THREE.Mesh(
    new THREE.TubeGeometry(new THREE.QuadraticBezierCurve3(p1, ctrl, p2), 14, 0.45, 5, false),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity })
  ));
}

LOBES.forEach((lobe, li) => {
  const lp = positions.filter((_, i) => lobeIdxs[i] === li);
  for (let i = 0; i < lp.length - 1; i++) if (Math.random() < 0.65) addTract(lp[i], lp[i+1], lobe.color, 0.55);
  if (lp.length > 2) addTract(lp[0], lp[lp.length-1], lobe.color, 0.4);
});
for (let i = 0; i < 22; i++) {
  const ai = Math.floor(Math.random() * positions.length);
  const bi = Math.floor(Math.random() * positions.length);
  if (lobeIdxs[ai] !== lobeIdxs[bi]) {
    const blend = LOBES[lobeIdxs[ai]].color.clone().lerp(LOBES[lobeIdxs[bi]].color, 0.5);
    addTract(positions[ai], positions[bi], blend, 0.22);
  }
}

const PSIG = 120;
const sigEdges = Array.from({ length: PSIG }, () => {
  const ai = Math.floor(Math.random() * positions.length);
  const bi = Math.floor(Math.random() * positions.length);
  return { a: positions[ai], b: positions[bi], t: Math.random(), speed: 0.004 + Math.random()*0.006, li: lobeIdxs[ai] };
});
const sigPos = new Float32Array(PSIG * 3);
const sigCol = new Float32Array(PSIG * 3);
sigEdges.forEach((e, i) => { const c = LOBES[e.li].color; sigCol[i*3]=c.r; sigCol[i*3+1]=c.g; sigCol[i*3+2]=c.b; });
const sigGeo = new THREE.BufferGeometry();
sigGeo.setAttribute('position', new THREE.BufferAttribute(sigPos, 3));
sigGeo.setAttribute('color', new THREE.BufferAttribute(sigCol, 3));
scene.add(new THREE.Points(sigGeo, new THREE.PointsMaterial({ size: 2.5, vertexColors: true, transparent: true, opacity: 0.9 })));

(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  sigEdges.forEach((e, i) => {
    e.t = (e.t + e.speed) % 1;
    const p = e.a.clone().lerp(e.b, e.t);
    sigPos[i*3]=p.x; sigPos[i*3+1]=p.y; sigPos[i*3+2]=p.z;
  });
  sigGeo.attributes.position.needsUpdate = true;
  composer.render();
})();

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w/h; camera.updateProjectionMatrix();
  renderer.setSize(w,h); composer.setSize(w,h);
});
</script>
</body>
</html>

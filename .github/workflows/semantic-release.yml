name: Semantic Release

on:
  push:
    branches:
      - master

concurrency:
  group: semantic-release
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write   # push version bump commit + tag

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install python-semantic-release
        run: uv tool install python-semantic-release

      - name: Run semantic release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: semantic-release version --push || true
      # Tag pushed above triggers release.yml, which owns build,
      # GitHub Release creation, and PyPI publish via OIDC Trusted
      # Publisher (workflow: release.yml, job: publish, env: pypi).

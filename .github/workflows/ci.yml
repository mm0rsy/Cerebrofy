name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Lint and type-check (fast feedback, no test deps needed)
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Mypy
        run: uv run mypy src/

  # ───────────────────────────────────────────────────────────────────────────
  # Tests — matrix across supported Python versions
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Unit tests
        run: uv run pytest tests/unit/ -v --tb=short --no-cov

      - name: Integration tests (excluding MCP)
        run: uv run pytest tests/integration/ --ignore=tests/integration/test_mcp_command.py -v --tb=short --no-cov

      - name: Coverage (combined unit + integration)
        run: uv run pytest tests/unit/ tests/integration/ --ignore=tests/integration/test_mcp_command.py -q

  # ───────────────────────────────────────────────────────────────────────────
  # MCP extra — separate job so it doesn't slow down the main matrix
  # ───────────────────────────────────────────────────────────────────────────
  test-mcp:
    name: Test MCP extra
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install with MCP extra
        run: uv sync --group dev --extra mcp

      - name: MCP integration tests
        run: uv run pytest tests/integration/test_mcp_command.py -v --tb=short --no-cov

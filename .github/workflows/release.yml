name: Release

# Triggers on semantic version tags pushed to master: v1.2.3
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# Cancel any in-flight release run for the same tag.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Gate: tests must pass before we publish anything
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Test gate
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --extra dev --extra mcp

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Tests with coverage
        run: uv run pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────────────────────────────────
  # Build: wheel + sdist from the tagged commit
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" pyproject.toml
          sed -i "s/__version__ = \".*\"/__version__ = \"${VERSION}\"/" src/cerebrofy/__init__.py

      - name: Build wheel and sdist
        run: uv build

      - name: Verify dist/ contents
        run: ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  # Publish: GitHub Release + PyPI
  #
  # PyPI uses OIDC Trusted Publisher — no static token needed.
  # One-time setup at pypi.org → your project → Publishing → Add a publisher:
  #   Owner: mm0rsy  |  Repo: Cerebrofy  |  Workflow: release.yml  |  Job: publish
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI & GitHub
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write   # create GitHub Release and upload release assets
      id-token: write   # PyPI OIDC Trusted Publisher

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
